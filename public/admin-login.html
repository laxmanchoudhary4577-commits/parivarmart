<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Parivar Mart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="admin-auth-wrapper">
        <div class="auth-image-side admin-side">
            <h1>Parivar Mart Admin</h1>
            <p>Secure portal for managing inventory, tracking orders, and overseeing store operations.</p>
        </div>
        <div class="auth-form-side">
            <div class="auth-form-container admin-form-container">
                <h2>Admin Login</h2>
                <div id="adminLoginMessage"></div>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Admin username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" placeholder="Admin password" required style="width: 100%; padding: 14px 16px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 15px; padding-right: 40px;">
                            <span onclick="togglePassword()" style="position: absolute; right: 14px; top: 14px; cursor: pointer; font-size: 18px; color: #6b7280;">&#128065;</span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-secondary btn-block" style="background: #1a1a1a; color: #fff; padding: 14px; font-size: 16px; margin-top: 24px; border: none;">Access Dashboard</button>
                </form>
                <div class="auth-links" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #e5e7eb;">
                    <p><a href="/login" style="color: #6b7280;">&larr; Back to Shop</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('adminLoginMessage');

            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    messageDiv.innerHTML = '<div class="alert alert-success">' + data.message + '</div>';
                    setTimeout(() => window.location.href = '/admin-dashboard', 1000);
                } else {
                    messageDiv.innerHTML = '<div class="alert alert-error">' + data.message + '</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="alert alert-error">Server error</div>';
            }
        });
    </script>
</body>
</html>
