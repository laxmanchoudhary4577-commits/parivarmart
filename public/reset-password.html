<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Parivar Mart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">Parivar Mart</a>
            </nav>
        </div>
    </header>

    <div class="form-container">
        <h2 class="section-title">Reset Password</h2>
        <div id="resetMessage"></div>
        <form id="resetForm">
            <div class="form-group">
                <label>Reset Code</label>
                <input type="text" id="resetCode" required placeholder="Enter reset code">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <div style="position: relative;">
                    <input type="password" id="newPassword" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; padding-right: 40px;">
                    <span onclick="togglePassword()" style="position: absolute; right: 10px; top: 12px; cursor: pointer; font-size: 18px;">&#128065;</span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
        </form>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('newPassword');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const resetCode = urlParams.get('code');
        if (resetCode) {
            document.getElementById('resetCode').value = resetCode;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('resetCode').value;
            const newPassword = document.getElementById('newPassword').value;
            const messageDiv = document.getElementById('resetMessage');

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, newPassword })
                });
                const data = await res.json();

                if (data.success) {
                    messageDiv.innerHTML = '<div class="alert alert-success">Password reset successfully!</div>';
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    messageDiv.innerHTML = '<div class="alert alert-error">' + data.message + '</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="alert alert-error">Server error</div>';
            }
        });
    </script>
</body>
</html>
