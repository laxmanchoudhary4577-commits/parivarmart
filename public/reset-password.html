<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff6b35">
    <title>Reset Password - Parivar Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ff6b35; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .container { background: white; border-radius: 20px; padding: 30px 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo h1 { color: #ff6b35; font-size: 24px; font-weight: 800; }
        
        h2 { font-size: 20px; color: #333; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #333; font-weight: 600; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #ff6b35; }
        
        .password-toggle { position: relative; }
        .password-toggle i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #666; cursor: pointer; }
        
        .btn { width: 100%; padding: 14px; background: #ff6b35; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #e55a2b; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .message { padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; text-align: center; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Parivar Mart</h1>
        </div>
        
        <h2>🔑 New Password</h2>
        <p class="subtitle">Create a new password for your account</p>
        
        <div id="message"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <div class="password-toggle">
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                    <i class="fas fa-eye" onclick="togglePassword('newPassword')"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="password-toggle">
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    <i class="fas fa-eye" onclick="togglePassword('confirmPassword')"></i>
                </div>
            </div>
            <button type="submit" class="btn" id="submitBtn">Reset Password</button>
        </form>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email') || '';
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match!', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Resetting...';
            
            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newPassword })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showMessage('✅ Password reset successful!', 'success');
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            } catch (err) {
                showMessage('❌ Error resetting password', 'error');
            }
            
            btn.disabled = false;
            btn.innerHTML = 'Reset Password';
        });
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
    </script>
</body>
</html>
