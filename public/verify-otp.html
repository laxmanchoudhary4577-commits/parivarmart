<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff6b35">
    <title>Verify OTP - Parivar Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ff6b35; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .container { background: white; border-radius: 20px; padding: 30px 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo h1 { color: #ff6b35; font-size: 24px; font-weight: 800; }
        
        h2 { font-size: 20px; color: #333; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .otp-inputs { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
        .otp-input { width: 38px; height: 42px; text-align: center; font-size: 18px; font-weight: 700; border: 2px solid #e0e0e0; border-radius: 8px; }
        .otp-input:focus { outline: none; border-color: #ff6b35; }
        
        @media (max-width: 360px) {
            .otp-input { width: 32px; height: 38px; font-size: 16px; }
            .otp-inputs { gap: 4px; }
        }
        
        .btn { width: 100%; padding: 14px; background: #ff6b35; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #e55a2b; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .message { padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; text-align: center; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        
        .resend { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .resend a { color: #ff6b35; text-decoration: none; font-weight: 600; }
        
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Parivar Mart</h1>
        </div>
        
        <h2>📧 Verify OTP</h2>
        <p class="subtitle">Enter the 6-digit code sent to<br><strong id="userEmail"></strong></p>
        
        <div id="message"></div>
        
        <form id="otpForm">
            <div class="otp-inputs">
                <input type="text" class="otp-input" inputmode="numeric" pattern="\d" maxlength="1" id="otp1" autofocus>
                <input type="text" class="otp-input" inputmode="numeric" pattern="\d" maxlength="1" id="otp2">
                <input type="text" class="otp-input" inputmode="numeric" pattern="\d" maxlength="1" id="otp3">
                <input type="text" class="otp-input" inputmode="numeric" pattern="\d" maxlength="1" id="otp4">
                <input type="text" class="otp-input" inputmode="numeric" pattern="\d" maxlength="1" id="otp5">
                <input type="text" class="otp-input" inputmode="numeric" pattern="\d" maxlength="1" id="otp6">
            </div>
            <button type="submit" class="btn" id="submitBtn">Verify OTP</button>
        </form>
        
        <div class="resend">
            Didn't receive OTP? <a href="#" onclick="resendOTP()">Resend</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || '';
        document.getElementById('userEmail').textContent = email;
        
        console.log('Email from URL:', email);
        
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
                const chars = paste.split('');
                inputs.forEach((inp, i) => {
                    if (chars[i]) inp.value = chars[i].replace(/[^0-9]/g, '');
                });
            });
        });
        
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = Array.from(inputs).map(i => i.value).join('');
            if (otp.length !== 6) {
                showMessage('Please enter 6-digit OTP', 'error');
                return;
            }
            
            console.log('Verifying OTP for:', email, 'OTP:', otp);
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Verifying...';
            
            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                
                console.log('Verify response:', res.status);
                const data = await res.json();
                console.log('Verify data:', data);
                
                if (res.ok) {
                    showMessage('✅ OTP verified! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/reset-password?email=' + encodeURIComponent(email), 1000);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('❌ Error verifying OTP', 'error');
            }
            
            btn.disabled = false;
            btn.innerHTML = 'Verify OTP';
        });
        
        async function resendOTP() {
            console.log('Resending OTP to:', email);
            try {
                const res = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                console.log('Resend response:', data);
                showMessage('✅ OTP resent!', 'success');
            } catch (err) {
                console.error('Error:', err);
                showMessage('❌ Error resending OTP', 'error');
            }
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
    </script>
</body>
</html>
