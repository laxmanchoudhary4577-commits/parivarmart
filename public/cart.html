<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#ff6b35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Cart - Parivar Mart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">Parivar Mart</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/products">Products</a></li>
                    <li><a href="/cart">Cart <span class="cart-badge" id="cartCount">0</span></a></li>
                    <li><a href="/orders">My Orders</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="/login" class="btn btn-outline" id="loginBtn">Login</a>
                    <a href="/register" class="btn btn-primary" id="registerBtn">Register</a>
                    <span id="userName" style="display: none;"></span>
                    <a href="#" class="btn btn-outline" id="logoutBtn" style="display: none;">Logout</a>
                </div>
            </nav>
        </div>
    </header>

    <section class="cart-container">
        <div class="container">
            <h2 class="section-title">Shopping Cart</h2>
            <div id="cartMessage"></div>
            <div id="cartItems"></div>
            <div class="cart-summary" id="cartSummary" style="display: none;">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="cartSubtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span>₹0</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total:</span>
                    <span id="cartTotal">₹0</span>
                </div>
                <button class="btn btn-primary btn-block" onclick="proceedToCheckout()">Proceed to Checkout</button>
            </div>
        </div>
    </section>

    <div class="modal" id="checkoutModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Checkout</h3>
                <button class="modal-close" onclick="closeCheckoutModal()">&times;</button>
            </div>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>House No. / Building Name</label>
                    <input type="text" id="houseNo" required placeholder="Flat No., House No., Building Name">
                </div>
                <div class="form-group">
                    <label>Street / Area</label>
                    <input type="text" id="street" required placeholder="Street Name, Area, Colony">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city" required placeholder="City Name">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" id="state" required placeholder="State Name">
                </div>
                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" id="pincode" required placeholder="6-digit Pincode" maxlength="6">
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="paymentMethod" required onchange="togglePaymentSection()">
                        <option value="Cash">Cash on Delivery</option>
                        <option value="Razorpay">Online Payment (UPI/Card)</option>
                    </select>
                </div>
                <div id="razorpaySection" style="display: none;">
                    <div class="form-group">
                        <label>Pay with UPI or Card</label>
                        <button type="button" class="btn btn-primary btn-block" onclick="initiateRazorpayPayment()">Pay Now</button>
                    </div>
                </div>
                <div id="codSection">
                    <button type="submit" class="btn btn-primary btn-block">Place Order</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>Parivar Mart</h4>
                    <p>Your trusted online shopping destination</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        checkSession();
        loadCart();
    </script>
</body>
</html>
