<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Parivar Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f0f0; }
        
        .header {
            background: #ff6b35;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h2 { font-size: 18px; }
        .menu-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .sidebar {
            position: fixed;
            top: 55px;
            left: -180px;
            width: 180px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 50;
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #eee;
        }
        .sidebar a:hover, .sidebar a.active { background: #fff4f1; color: #ff6b35; }
        
        .main { padding: 10px; padding-top: 65px; }
        
        .stats { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .stat-box {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            flex: 1;
            min-width: 70px;
            text-align: center;
        }
        .stat-box .num { font-size: 20px; font-weight: bold; color: #ff6b35; }
        .stat-box .txt { font-size: 11px; color: #666; }
        
        table { width: 100%; background: white; border-radius: 8px; overflow: hidden; border-collapse: collapse; }
        th { background: #ff6b35; color: white; padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; vertical-align: top; }
        tr:hover { background: #fafafa; }
        
        select.status-select {
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 11px;
            background: white;
            cursor: pointer;
        }
        
        select.status-select.pending { background: #fff8e1; }
        select.status-select.processing { background: #e3f2fd; }
        select.status-select.shipped { background: #f5f5f5; }
        select.status-select.completed { background: #e8f5e9; }
        select.status-select.cancelled { background: #ffebee; }
        
        .empty { text-align: center; padding: 40px; color: #999; }
        .empty i { font-size: 40px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Orders</h2>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
    
    <div class="sidebar" id="sidebar">
        <a href="/admin-dashboard">Dashboard</a>
        <a href="/admin-products">Products</a>
        <a href="/admin-orders" style="background:#fff4f1;color:#ff6b35;font-weight:600;">Orders</a>
        <a href="/admin-users">Users</a>
        <a href="/admin/logout">Logout</a>
    </div>

    <div class="main">
        <div class="stats">
            <div class="stat-box"><div class="num" id="total">0</div><div class="txt">Total</div></div>
            <div class="stat-box"><div class="num" id="pending">0</div><div class="txt">Pending</div></div>
            <div class="stat-box"><div class="num" id="shipped">0</div><div class="txt">Shipped</div></div>
            <div class="stat-box"><div class="num" id="done">0</div><div class="txt">Done</div></div>
        </div>

        <div id="ordersTable"></div>
    </div>

    <script>
        checkAdminSession();
        loadOrders();

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        async function loadOrders() {
            try {
                const res = await fetch('/admin/all-orders', { credentials: 'include' });
                const data = await res.json();
                
                if (data.success && data.orders.length > 0) {
                    let p = 0, sh = 0, d = 0;
                    data.orders.forEach(o => {
                        if (o.status === 'Pending') p++;
                        else if (o.status === 'Shipped') sh++;
                        else if (o.status === 'Completed') d++;
                    });
                    
                    document.getElementById('total').textContent = data.orders.length;
                    document.getElementById('pending').textContent = p;
                    document.getElementById('shipped').textContent = sh;
                    document.getElementById('done').textContent = d;
                    
                    document.getElementById('ordersTable').innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Customer</th>
                                    <th>Address</th>
                                    <th>Products</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.orders.map(o => `
                                    <tr>
                                        <td><b>#${o.id}</b><br><small>${new Date(o.order_date).toLocaleDateString()}</small></td>
                                        <td>
                                            <b>${o.user_name || 'N/A'}</b><br>
                                            <small>${o.user_phone || ''}</small><br>
                                            <small style="color:#888">${o.user_email || ''}</small>
                                        </td>
                                        <td style="max-width:150px;">${o.shipping_address || 'No address'}</td>
                                        <td style="max-width:120px;font-size:11px;">${o.products || 'N/A'}</td>
                                        <td><b>₹${o.total_amount}</b></td>
                                        <td>
                                            <select class="status-select ${o.status.toLowerCase()}" onchange="updateStatus(${o.id}, this.value)">
                                                <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                                <option value="Processing" ${o.status === 'Processing' ? 'selected' : ''}>Processing</option>
                                                <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                                <option value="Completed" ${o.status === 'Completed' ? 'selected' : ''}>Completed</option>
                                                <option value="Cancelled" ${o.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                            </select>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    document.getElementById('ordersTable').innerHTML = '<div class="empty"><i class="fas fa-box"></i> No orders found</div>';
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function updateStatus(orderId, status) {
            if (!confirm('Update order #' + orderId + ' to ' + status + '?')) {
                loadOrders();
                return;
            }
            
            try {
                const res = await fetch('/admin/update-order/' + orderId, {
                    credentials: 'include',
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                
                if (res.ok) {
                    alert('Order updated!');
                    loadOrders();
                }
            } catch (e) {
                alert('Error updating');
            }
        }
    </script>
</body>
</html>
