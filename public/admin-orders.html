<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Parivar Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f0f0; }
        
        .header {
            background: #ff6b35;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h2 { font-size: 18px; }
        .menu-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .sidebar {
            position: fixed;
            top: 55px;
            left: -180px;
            width: 180px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 50;
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            display: block;
            padding: 12px 15px;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #eee;
        }
        .sidebar a:hover, .sidebar a.active { background: #fff4f1; color: #ff6b35; }
        
        .main { padding: 10px; padding-top: 65px; }
        
        .stats { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .stat-box {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            flex: 1;
            min-width: 70px;
            text-align: center;
        }
        .stat-box .num { font-size: 20px; font-weight: bold; color: #ff6b35; }
        .stat-box .txt { font-size: 11px; color: #666; }
        
        .order-table {
            width: 100%;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border-collapse: collapse;
        }
        
        .order-table th {
            background: #ff6b35;
            color: white;
            padding: 12px 8px;
            text-align: left;
            font-size: 12px;
        }
        
        .order-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #eee;
            font-size: 12px;
            vertical-align: top;
        }
        
        .order-table tr:hover { background: #fafafa; }
        
        .order-info { margin-bottom: 4px; }
        .order-info b { color: #333; }
        
        .addr-box {
            background: #f9f9f9;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 11px;
            max-width: 150px;
        }
        
        .total {
            font-size: 14px;
            font-weight: bold;
            color: #ff6b35;
        }
        
        .status-dropdown {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
        }
        
        .status-dropdown.pending { background: #fffde7; }
        .status-dropdown.processing { background: #e3f2fd; }
        .status-dropdown.shipped { background: #f5f5f5; }
        .status-dropdown.completed { background: #e8f5e9; }
        .status-dropdown.cancelled { background: #ffebee; }
        
        .empty { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Orders</h2>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
    
    <div class="sidebar" id="sidebar">
        <a href="/admin-dashboard">Dashboard</a>
        <a href="/admin-products">Products</a>
        <a href="/admin-orders" style="background:#fff4f1;color:#ff6b35;font-weight:600;">Orders</a>
        <a href="/admin-users">Users</a>
        <a href="/admin/logout">Logout</a>
    </div>

    <div class="main">
        <div class="stats">
            <div class="stat-box"><div class="num" id="total">0</div><div class="txt">Total</div></div>
            <div class="stat-box"><div class="num" id="pending">0</div><div class="txt">Pending</div></div>
            <div class="stat-box"><div class="num" id="shipped">0</div><div class="txt">Shipped</div></div>
            <div class="stat-box"><div class="num" id="done">0</div><div class="txt">Done</div></div>
        </div>

        <div id="ordersTable"></div>
    </div>

    <script>
        checkAdminSession();
        loadOrders();

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        async function loadOrders() {
            try {
                const res = await fetch('/admin/all-orders', { credentials: 'include' });
                const data = await res.json();
                
                if (data.success && data.orders.length > 0) {
                    let p = 0, sh = 0, d = 0;
                    data.orders.forEach(o => {
                        if (o.status === 'Pending') p++;
                        else if (o.status === 'Shipped') sh++;
                        else if (o.status === 'Completed') d++;
                    });
                    
                    document.getElementById('total').textContent = data.orders.length;
                    document.getElementById('pending').textContent = p;
                    document.getElementById('shipped').textContent = sh;
                    document.getElementById('done').textContent = d;
                    
                    document.getElementById('ordersTable').innerHTML = `
                        <table class="order-table">
                            <thead>
                                <tr>
                                    <th style="width:50px;">Order ID</th>
                                    <th style="width:120px;">Customer</th>
                                    <th style="width:150px;">Address</th>
                                    <th style="width:120px;">Products</th>
                                    <th style="width:70px;">Total</th>
                                    <th style="width:100px;">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.orders.map(o => `
                                    <tr>
                                        <td>
                                            <div class="order-info"><b>#${o.id}</b></div>
                                            <div style="color:#888;font-size:11px;">${new Date(o.order_date).toLocaleDateString()}</div>
                                        </td>
                                        <td>
                                            <div class="order-info"><b>${o.user_name || 'N/A'}</b></div>
                                            <div style="color:#666;font-size:11px;">📱 ${o.user_phone || 'N/A'}</div>
                                            <div style="color:#888;font-size:10px;">${o.user_email || ''}</div>
                                        </td>
                                        <td>
                                            <div class="addr-box">${o.shipping_address || 'No address'}</div>
                                        </td>
                                        <td style="font-size:11px;">${o.products || 'N/A'}</td>
                                        <td><div class="total">₹${o.total_amount}</div></td>
                                        <td>
                                            <select class="status-dropdown ${o.status.toLowerCase()}" onchange="updateStatus(${o.id}, this.value)">
                                                <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                                <option value="Processing" ${o.status === 'Processing' ? 'selected' : ''}>Processing</option>
                                                <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                                <option value="Completed" ${o.status === 'Completed' ? 'selected' : ''}>Completed</option>
                                                <option value="Cancelled" ${o.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                            </select>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    document.getElementById('ordersTable').innerHTML = '<div class="empty">No orders yet</div>';
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function updateStatus(orderId, status) {
            if (!confirm('Update order #' + orderId + ' to ' + status + '?')) {
                loadOrders();
                return;
            }
            
            try {
                const res = await fetch('/admin/update-order/' + orderId, {
                    credentials: 'include',
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                
                if (res.ok) {
                    alert('Status updated!');
                    loadOrders();
                }
            } catch (e) {
                alert('Error updating');
            }
        }
    </script>
</body>
</html>
