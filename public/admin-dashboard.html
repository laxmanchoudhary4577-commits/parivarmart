<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#ff6b35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Admin Dashboard - Parivar Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-sidebar {
            display: none;
        }
        .admin-content {
            margin-left: 0;
            padding: 16px;
        }
    </style>
</head>
<body>
    <!-- Mobile Admin Header -->
    <div class="mobile-admin-header">
        <button class="admin-menu-btn" onclick="toggleAdminMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <span class="admin-title">Parivar Mart Admin</span>
        <a href="/admin/logout" class="admin-logout-btn"><i class="fas fa-sign-out-alt"></i></a>
    </div>

    <!-- Mobile Admin Menu -->
    <div class="mobile-admin-menu" id="adminMenu">
        <a href="/admin-dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/admin-products"><i class="fas fa-box"></i> Products</a>
        <a href="/admin-orders"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="/admin-users"><i class="fas fa-users"></i> Users</a>
        <a href="/admin/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="admin-content">
        <div class="admin-header">
            <h1>Dashboard</h1>
            <p>Welcome, <span id="adminName">Admin</span></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Orders</h3>
                <div class="value" id="totalOrders">0</div>
            </div>
            <div class="stat-card">
                <h3>Pending Orders</h3>
                <div class="value" id="pendingOrders" style="color: #ff9800;">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Products</h3>
                <div class="value" id="totalProducts">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <div class="value" id="totalRevenue" style="color: #4caf50;">₹0</div>
            </div>
        </div>

        <h2 style="margin-bottom: 20px;">Recent Orders</h2>
        <div id="recentOrders"></div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        checkAdminSession();
        loadAdminStats();
        loadRecentOrders();

        function toggleAdminMenu() {
            const menu = document.getElementById('adminMenu');
            menu.classList.toggle('active');
        }

        document.getElementById('adminLogout').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/admin/logout', { credentials: 'include' });
            window.location.href = '/admin-login';
        });
    </script>
</body>
</html>
