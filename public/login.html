<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#ff6b35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Login - Parivar Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">Parivar Mart</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/products">Products</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="auth-page-wrapper">
        <div class="auth-image-side">
            <h1>Welcome to Parivar Mart</h1>
            <p>Your one-stop destination for daily essentials, fresh produce, and premium household items.</p>
        </div>
        <div class="auth-form-side">
            <div class="auth-form-container">
                <h2>User Login</h2>
                <div id="loginMessage"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" placeholder="Enter your password" required style="width: 100%; padding: 14px 16px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 15px; padding-right: 40px;">
                            <span onclick="togglePassword('password')" style="position: absolute; right: 14px; top: 14px; cursor: pointer; font-size: 18px; color: #6b7280;">&#128065;</span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" style="padding: 14px; font-size: 16px; margin-top: 24px;">Login to Account</button>
                </form>
                <div class="auth-links">
                    <p><a href="/forgot-password">Forgot Password?</a></p>
                    <p style="margin-top: 12px;">Don't have an account? <a href="/register">Create one</a></p>
                    <p style="margin-top: 12px; padding-top: 16px; border-top: 1px solid #e5e7eb;"><a href="/admin-login" style="color: #6b7280;">Admin Portal</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('loginMessage');
            const btn = e.target.querySelector('button[type="submit"]');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const res = await fetch('/api/login', {
                    credentials: 'include',
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    messageDiv.innerHTML = '<div class="alert alert-success">' + data.message + '</div>';
                    
                    // Verify session is set before redirect
                    const sessionCheck = await fetch('/api/check-session', { credentials: 'include' });
                    const sessionData = await sessionCheck.json();
                    
                    if (sessionData.loggedIn) {
                        window.location.href = '/';
                    } else {
                        messageDiv.innerHTML = '<div class="alert alert-error">Session error. Please try again.</div>';
                    }
                } else {
                    messageDiv.innerHTML = '<div class="alert alert-error">' + data.message + '</div>';
                    btn.disabled = false;
                    btn.textContent = 'Login to Account';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="alert alert-error">Server error. Please try again.</div>';
                btn.disabled = false;
                btn.textContent = 'Login to Account';
            }
        });
    </script>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
        <a href="/" class="mobile-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/products" class="mobile-nav-item">
            <i class="fas fa-store"></i>
            <span>Products</span>
        </a>
        <a href="/cart" class="mobile-nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
            <span class="mobile-cart-badge" id="mobileCartCount">0</span>
        </a>
        <a href="/orders" class="mobile-nav-item">
            <i class="fas fa-box"></i>
            <span>Orders</span>
        </a>
        <a href="/login" class="mobile-nav-item active">
            <i class="fas fa-user"></i>
            <span>Account</span>
        </a>
    </nav>
</body>
</html>
