<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Parivan Mart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="admin-sidebar">
        <a href="/" class="logo">Parivan Mart Admin</a>
        <ul class="admin-nav">
            <li><a href="/admin-dashboard">Dashboard</a></li>
            <li><a href="/admin-products">Products</a></li>
            <li><a href="/admin-orders">Orders</a></li>
            <li><a href="/admin-users" class="active">Users</a></li>
            <li><a href="#" id="adminLogout">Logout</a></li>
        </ul>
    </nav>

    <div class="admin-content">
        <div class="admin-header">
            <h1>Manage Users</h1>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Joined</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
            </tbody>
        </table>
    </div>

    <script src="/js/main.js"></script>
    <script>
        checkAdminSession();
        loadAdminUsers();

        document.getElementById('adminLogout').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/admin/logout');
            window.location.href = '/admin-login';
        });
    </script>
</body>
</html>
