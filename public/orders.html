<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#ff6b35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>My Orders - Parivar Mart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">Parivar Mart</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/products">Products</a></li>
                    <li><a href="/cart">Cart <span class="cart-badge" id="cartCount">0</span></a></li>
                    <li><a href="/orders">My Orders</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="/login" class="btn btn-outline" id="loginBtn">Login</a>
                    <a href="/register" class="btn btn-primary" id="registerBtn">Register</a>
                    <span id="userName" style="display: none;"></span>
                    <a href="#" class="btn btn-outline" id="logoutBtn" style="display: none;">Logout</a>
                </div>
            </nav>
        </div>
    </header>

    <section class="orders-container">
        <div class="container">
            <h2 class="section-title">My Orders</h2>
            <div id="ordersMessage"></div>
            <div id="ordersList"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>Parivar Mart</h4>
                    <p>Your trusted online shopping destination</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
        <a href="/" class="mobile-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/products" class="mobile-nav-item">
            <i class="fas fa-store"></i>
            <span>Products</span>
        </a>
        <a href="/cart" class="mobile-nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
            <span class="mobile-cart-badge" id="mobileCartCount">0</span>
        </a>
        <a href="/orders" class="mobile-nav-item active">
            <i class="fas fa-box"></i>
            <span>Orders</span>
        </a>
        <a href="/login" class="mobile-nav-item" id="mobileAccountBtn">
            <i class="fas fa-user"></i>
            <span>Account</span>
        </a>
    </nav>

    <script src="/js/main.js"></script>
    <script>
        checkSession();
        loadOrders();
        
        function updateMobileNav() {
            const mobileCartCount = document.getElementById('mobileCartCount');
            const mainCartCount = document.getElementById('cartCount');
            if (mobileCartCount && mainCartCount) {
                mobileCartCount.textContent = mainCartCount.textContent;
            }
        }
        const originalCheckSessionOrders = window.checkSession;
        window.checkSession = async function() {
            if (originalCheckSessionOrders) await originalCheckSessionOrders();
            updateMobileNav();
        };
    </script>
</body>
</html>
