<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff6b35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>My Orders - Parivar Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar" id="mainNav">
                <a href="/" class="logo">Parivar Mart</a>
                <ul class="nav-links">
                    <li><a href="/" onclick="toggleMobileMenu()">Home</a></li>
                    <li><a href="/products" onclick="toggleMobileMenu()">Products</a></li>
                    <li><a href="/cart" onclick="toggleMobileMenu()">Cart <span class="cart-badge" id="cartCount">0</span></a></li>
                    <li><a href="/orders" onclick="toggleMobileMenu()">My Orders</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="/login" class="btn btn-outline" id="loginBtn">Login</a>
                    <a href="/register" class="btn btn-primary" id="registerBtn">Register</a>
                    <span id="userName" style="display: none;"></span>
                    <a href="#" class="btn btn-outline" id="logoutBtn" style="display: none;">Logout</a>
                </div>
                <div class="overlay-mask" onclick="toggleMobileMenu()"></div>
                <div class="mobile-menu" id="mobileMenu">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <a href="/" class="logo" style="border: none; padding: 0;">Parivar Mart</a>
                        <i class="fas fa-times" onclick="toggleMobileMenu()" style="font-size: 24px; color: #333; cursor: pointer;"></i>
                    </div>
                    <a href="/" onclick="toggleMobileMenu()">Home</a>
                    <a href="/products" onclick="toggleMobileMenu()">Products</a>
                    <a href="/cart" onclick="toggleMobileMenu()">Cart</a>
                    <a href="/orders" onclick="toggleMobileMenu()">My Orders</a>
                    <div style="margin-top: auto; display: grid; gap: 15px;">
                        <a href="/login" class="btn btn-outline" style="justify-content: center; border-radius: 12px; height: 55px;">Login</a>
                        <a href="/register" class="btn btn-primary" style="justify-content: center; border-radius: 12px; height: 55px;">Register</a>
                    </div>
                </div>
                <button class="mobile-toggle" onclick="toggleMobileMenu()">☰</button>
            </nav>
        </div>
    </header>

    <section class="orders-container">
        <div class="container">
            <h2 class="section-title">My Orders</h2>
            <div id="ordersMessage"></div>
            <div id="ordersList"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>Parivar Mart</h4>
                    <p>Your trusted online shopping destination</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
        <a href="/" class="mobile-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/products" class="mobile-nav-item">
            <i class="fas fa-store"></i>
            <span>Products</span>
        </a>
        <a href="/cart" class="mobile-nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
            <span class="mobile-cart-badge" id="mobileCartCount">0</span>
        </a>
        <a href="/orders" class="mobile-nav-item active">
            <i class="fas fa-box"></i>
            <span>Orders</span>
        </a>
        <a href="/login" class="mobile-nav-item" id="mobileAccountBtn">
            <i class="fas fa-user"></i>
            <span>Account</span>
        </a>
    </nav>

    <script src="/js/main.js"></script>
    <script>
        function toggleMobileMenu() {
            const nav = document.getElementById('mainNav');
            nav.classList.toggle('mobile-open');
        }
        
        checkSession();
        loadOrders();
        
        function updateMobileNav() {
            const mobileCartCount = document.getElementById('mobileCartCount');
            const mainCartCount = document.getElementById('cartCount');
            if (mobileCartCount && mainCartCount) {
                mobileCartCount.textContent = mainCartCount.textContent;
            }
        }
        const originalCheckSessionOrders = window.checkSession;
        window.checkSession = async function() {
            if (originalCheckSessionOrders) await originalCheckSessionOrders();
            updateMobileNav();
        };
    </script>
</body>
</html>
