<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff6b35">
    <title>Forgot Password - Parivar Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ff6b35; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .container { background: white; border-radius: 20px; padding: 30px 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo h1 { color: #ff6b35; font-size: 24px; font-weight: 800; }
        .logo p { color: #666; font-size: 14px; margin-top: 5px; }
        
        h2 { font-size: 20px; color: #333; margin-bottom: 20px; text-align: center; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #333; font-weight: 600; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #ff6b35; }
        
        .btn { width: 100%; padding: 14px; background: #ff6b35; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #e55a2b; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .message { padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; text-align: center; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        
        .back-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .back-link a { color: #ff6b35; text-decoration: none; font-weight: 600; }
        
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Parivar Mart</h1>
            <p>Your trusted shopping destination</p>
        </div>
        
        <h2>🔐 Reset Password</h2>
        <div id="message"></div>
        
        <form id="forgotForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Send OTP</button>
        </form>
        
        <div class="back-link">
            <a href="/login">← Back to Login</a>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Sending...';
            msg.className = 'message';
            msg.style.display = 'none';
            
            console.log('Sending OTP to:', email);
            
            try {
                const res = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                console.log('Response status:', res.status);
                const data = await res.json();
                console.log('Response data:', data);
                
                if (res.ok) {
                    msg.textContent = '✅ OTP sent! Check your email.';
                    msg.className = 'message success';
                    setTimeout(() => window.location.href = '/verify-otp?email=' + encodeURIComponent(email), 1500);
                } else {
                    msg.textContent = '❌ ' + data.message;
                    msg.className = 'message error';
                }
            } catch (err) {
                console.error('Error:', err);
                msg.textContent = '❌ Error: ' + err.message;
                msg.className = 'message error';
            }
            
            btn.disabled = false;
            btn.innerHTML = 'Send OTP';
        });
    </script>
</body>
</html>
