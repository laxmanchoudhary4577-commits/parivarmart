<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Parivar Mart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        :root {
            --green-primary: #16a34a;
            --green-dark: #15803d;
            --green-light: #22c55e;
            --orange-accent: #f97316;
            --black-rich: #0f172a;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f0fdf4;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', 'Nunito', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            padding: 20px;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(22, 163, 74, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(249, 115, 22, 0.08) 0%, transparent 40%);
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
        }

        .auth-card {
            background: var(--glass);
            border-radius: 24px;
            padding: 45px 35px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(22, 163, 74, 0.1);
            backdrop-filter: blur(20px);
        }

        .logo-wrap { margin-bottom: 25px; text-align: center; }
        
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 30px rgba(22, 163, 74, 0.25);
        }
        
        .logo-icon i { font-size: 32px; color: white; }

        .brand-name { font-size: 22px; font-weight: 700; color: var(--green-dark); text-align: center; }

        .step-container { display: none; }
        .step-container.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; font-weight: 600; color: var(--black-rich); margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 14px; }

        .email-display {
            background: #dcfce7;
            color: #15803d;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 25px;
            text-align: center;
            display: none;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 16px 20px; border-radius: 14px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 15px; transition: all 0.3s; }
        .input-group input:focus { outline: none; border-color: var(--green-primary); background: white; box-shadow: 0 8px 20px rgba(22, 163, 74, 0.1); }

        .otp-grid { display: flex; justify-content: center; gap: 10px; margin: 20px 0 30px; }
        .otp-grid input { width: 48px; height: 56px; text-align: center; font-size: 24px; font-weight: 700; border-radius: 12px; border: 2px solid #e2e8f0; background: #f8fafc; }
        .otp-grid input:focus { outline: none; border-color: var(--green-primary); }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.25);
        }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        .footer-links { margin-top: 25px; text-align: center; font-size: 14px; color: var(--text-muted); }
        .footer-links a { color: var(--green-primary); text-decoration: none; font-weight: 600; }

        .alert { padding: 14px 18px; border-radius: 12px; font-size: 14px; margin-bottom: 20px; display: none; animation: slideDown 0.4s ease; font-weight: 500; }
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .resend-wrap { margin-top: 20px; font-size: 14px; color: var(--text-muted); text-align: center; }
        .resend-wrap button { background: none; border: none; color: var(--green-primary); font-weight: 600; cursor: pointer; text-decoration: underline; }
        .resend-wrap button:disabled { color: #94a3b8; cursor: not-allowed; text-decoration: none; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-wrap">
                <div class="logo-icon"><i class="fas fa-shopping-basket"></i></div>
                <div class="brand-name">Parivar Mart</div>
            </div>

            <div id="alertBox" class="alert"></div>

            <div id="step1" class="step-container active">
                <div class="header">
                    <h1>Forgot Password?</h1>
                    <p>Enter your email to receive a verification code</p>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <button class="btn-primary" id="otpBtn" onclick="sendOTP()">
                    <span class="btn-text">Send Verification Code</span>
                    <i class="fas fa-paper-plane"></i>
                    <div class="spinner"></div>
                </button>
            </div>

            <div id="step2" class="step-container">
                <div class="header">
                    <h1>Verify Your Email</h1>
                    <p>Enter the 6-digit code sent to your email</p>
                </div>
                <div class="email-display" id="emailDisplay">
                    <i class="fas fa-envelope"></i> <span></span>
                </div>
                <div class="otp-grid">
                    <input type="text" id="otp_1" maxlength="1" oninput="moveFocus(this, 1)">
                    <input type="text" id="otp_2" maxlength="1" oninput="moveFocus(this, 2)">
                    <input type="text" id="otp_3" maxlength="1" oninput="moveFocus(this, 3)">
                    <input type="text" id="otp_4" maxlength="1" oninput="moveFocus(this, 4)">
                    <input type="text" id="otp_5" maxlength="1" oninput="moveFocus(this, 5)">
                    <input type="text" id="otp_6" maxlength="1" oninput="moveFocus(this, 6)">
                </div>
                <button class="btn-primary" id="verifyBtn" onclick="verifyOTP()">
                    <span class="btn-text">Verify Code</span>
                    <i class="fas fa-check-circle"></i>
                    <div class="spinner"></div>
                </button>
                <div class="resend-wrap">
                    Didn't receive? <button id="resendBtn" onclick="resendOTP()">Resend <span id="timer">(60s)</span></button>
                </div>
            </div>

            <div id="step3" class="step-container">
                <div class="header">
                    <h1>Set New Password</h1>
                    <p>Enter your new password below</p>
                </div>
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                </div>
                <button class="btn-primary" id="resetBtn" onclick="resetPassword()">
                    <span class="btn-text">Reset Password</span>
                    <i class="fas fa-key"></i>
                    <div class="spinner"></div>
                </button>
            </div>

            <div class="footer-links" id="footerLinks">
                Remember password? <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        let userEmail = '';
        let timeLeft = 60;

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        function setLoading(btn, isLoading) {
            const text = btn.querySelector('.btn-text');
            const icon = btn.querySelector('i:not(.spinner)');
            const spinner = btn.querySelector('.spinner');
            btn.disabled = isLoading;
            if (text) text.style.display = isLoading ? 'none' : 'block';
            if (icon) icon.style.display = isLoading ? 'none' : 'inline';
            spinner.style.display = isLoading ? 'inline-block' : 'none';
        }

        function showStep(stepNum) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + stepNum).classList.add('active');
        }

        function moveFocus(el, index) {
            const inputs = document.querySelectorAll('.otp-grid input');
            if (el.value.length === 1 && index < 6) inputs[index].focus();
            if (el.value === '' && index > 1) inputs[index - 2].focus();
        }

        document.querySelectorAll('.otp-grid input').forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                const allInputs = document.querySelectorAll('.otp-grid input');
                if (e.key === 'Backspace' && input.value === '' && index > 0) {
                    allInputs[index - 1].focus();
                }
            });
        });

        async function sendOTP() {
            const emailInput = document.getElementById('email');
            userEmail = emailInput.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!userEmail || !emailRegex.test(userEmail)) {
                return showAlert('Please enter a valid email address', 'error');
            }
            
            const btn = document.getElementById('otpBtn');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('recoveryEmail', userEmail);
                    document.querySelector('#emailDisplay span').textContent = userEmail;
                    document.getElementById('emailDisplay').style.display = 'inline-block';
                    showAlert('Verification code sent to your email!', 'success');
                    showStep(2);
                    startTimer();
                } else {
                    showAlert(data.message || 'Email not found in our records', 'error');
                }
            } catch (e) {
                showAlert('Connection error. Please try again.', 'error');
            } finally {
                setLoading(btn, false);
            }
        }

        async function verifyOTP() {
            const inputs = document.querySelectorAll('.otp-grid input');
            const otpValue = Array.from(inputs).map(i => i.value).join('');
            
            if (otpValue.length < 6) {
                return showAlert('Please enter the full 6-digit code', 'error');
            }

            const btn = document.getElementById('verifyBtn');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp: otpValue })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('OTP Verified! Now set your new password.', 'success');
                    showStep(3);
                } else {
                    showAlert(data.message || 'Invalid OTP', 'error');
                    inputs.forEach(input => input.value = '');
                    inputs[0].focus();
                }
            } catch (e) {
                showAlert('Server connection error', 'error');
            } finally {
                setLoading(btn, false);
            }
        }

        async function resetPassword() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (!newPass || newPass.length < 6) {
                return showAlert('Password must be at least 6 characters', 'error');
            }
            
            if (newPass !== confirmPass) {
                return showAlert('Passwords do not match', 'error');
            }

            const btn = document.getElementById('resetBtn');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, newPassword: newPass })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('Password reset successful!', 'success');
                    localStorage.removeItem('recoveryEmail');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    showAlert(data.message || 'Error resetting password', 'error');
                }
            } catch (e) {
                showAlert('Server connection error', 'error');
            } finally {
                setLoading(btn, false);
            }
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;
            timeLeft = 60;
            
            const timer = setInterval(() => {
                timeLeft--;
                timerEl.textContent = `(${timeLeft}s)`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    timerEl.textContent = '';
                }
            }, 1000);
        }

        async function resendOTP() {
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;
            resendBtn.style.color = '#94a3b8';

            try {
                const res = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                
                if (res.ok) {
                    showAlert('New verification code sent!', 'success');
                    startTimer();
                } else {
                    showAlert('Error resending OTP', 'error');
                    resendBtn.disabled = false;
                    resendBtn.style.color = '';
                }
            } catch (e) {
                showAlert('Server connection error', 'error');
                resendBtn.disabled = false;
                resendBtn.style.color = '';
            }
        }
    </script>
</body>
</html>
