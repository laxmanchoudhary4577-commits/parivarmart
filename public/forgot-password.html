<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Parivar Mart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">Parivar Mart</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/products">Products</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="form-container">
        <h2 class="section-title">Forgot Password</h2>
        <p style="margin-bottom: 20px; color: #666;">Enter your registered email to reset password</p>
        <div id="forgotMessage"></div>
        <form id="forgotForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">
            Remember password? <a href="/login">Login</a>
        </p>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('forgotMessage');

            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.success) {
                    messageDiv.innerHTML = '<div class="alert alert-success">Password reset link has been sent to your email!</div>';
                    document.getElementById('forgotForm').style.display = 'none';
                } else {
                    messageDiv.innerHTML = '<div class="alert alert-error">' + data.message + '</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="alert alert-error">Server error</div>';
            }
        });
    </script>
</body>
</html>
